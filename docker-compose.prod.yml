services:
  # 1. Redis Service (Message Broker)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # In production, we don't expose 6379 to the host unless needed for debugging.
    # The containers communicate via the 'app-network'.
    networks:
      - app-network

  # 2. Web Backend (ASGI Server)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    deploy:
      replicas: 3
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=project.settings.production
    ports:
      - "8000:8000"
    command:
      ["gunicorn",
     "project.asgi:application",
     "--bind", "0.0.0.0:8000",
     "--workers", "3",
     "--worker-class", "uvicorn_worker.UvicornWorker",
     "--log-level", "info"]
    healthcheck:
      test: [
        "curl", "-f", "http://localhost:8000/api/v2/health_check/"
      ]
      interval: 1m30s
      timeout: 30s
      retries: 3
      start_period: 30s
    depends_on:
      - redis
    networks:
      - app-network

  # 3. Celery Worker (Background Tasks)
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ./backend/.env
    # We use the exact command from your local testing, adapted for the container.
    command: celery -A project worker --loglevel=info -Q analytics,maintenance,celery --pool=gevent
    depends_on:
      - redis
      - backend
    networks:
      - app-network

  # 4. Frontend Application
  react-app:
    build:
      context: ./UI/datacube-UI
      dockerfile: Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 2
    # container_name: react_app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - app-network

networks:
  app-network:
    external: true
