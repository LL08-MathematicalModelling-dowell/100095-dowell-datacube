# On-server build (legacy). Prefer GitHub Actions + deploy/docker-compose.yml (GHCR pull).
# Backend image: uv sync in backend/Dockerfile.prod (pyproject.toml + uv.lock).
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=project.settings.production
    expose:
      - "8000"
    command: >
      gunicorn project.asgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --worker-class uvicorn_worker.UvicornWorker
      --log-level info
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/health_check/').read()",
        ]
      interval: 45s
      timeout: 10s
      retries: 3
    labels:
      - autoheal=true
    depends_on:
      - redis
    networks:
      - app-network

  autoheal:
    image: willfarrell/autoheal:latest
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    command: celery -A project worker -Q analytics,maintenance -l info
    healthcheck:
      test: ["CMD-SHELL", "celery -A project inspect ping"]
      interval: 1m
      timeout: 15s
    labels:
      - autoheal=true
    depends_on:
      - redis
      - backend
    networks:
      - app-network

  react-app:
    build:
      context: ./UI/datacube-UI
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - NODE_ENV=production
    networks:
      - app-network

networks:
  app-network:
    external: true
