services:
  # 1. Redis Service
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app-network

  # 2. Web Backend
  backend:
    # Build & Push logic: image name includes your Docker Hub user + variable
    # image: ${DOCKER_HUB_USER}/backend:${APP_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    # deploy:
    #   replicas: 3
    env_file:
      - ./backend/.env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=project.settings.production
    expose:
      - 8000
    command: >
      gunicorn project.asgi:application 
      --bind 0.0.0.0:8000 
      --workers 3 
      --worker-class uvicorn_worker.UvicornWorker 
      --log-level info
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/health_check/').read()"]
      interval: 45s
      timeout: 10s
      retries: 3
    labels:
      - "autoheal=true"
    depends_on:
      - redis
    networks:
      - app-network

  # 3. Autoheal Service
  autoheal:
    image: willfarrell/autoheal:latest
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network

  # 4. Celery Worker
  celery_worker:
    # Reuses the same image as backend to keep versioning unified
    # image: ${DOCKER_HUB_USER}/backend:${APP_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    command: celery -A project worker -Q analytics,maintenance -l info
    healthcheck:
      test: ["CMD-SHELL", "celery -A project inspect ping"]
      interval: 1m
      timeout: 15s
    labels:
      - "autoheal=true"
    depends_on:
      - redis
      - backend
    networks:
      - app-network

  # 5. Frontend Application
  react-app:
    # image: ${DOCKER_HUB_USER}/frontend:${APP_VERSION:-latest}
    build:
      context: ./UI/datacube-UI
      dockerfile: Dockerfile
    restart: unless-stopped
    # deploy:
    #   replicas: 2
    expose:
      - 80
    environment:
      - NODE_ENV=production
    networks:
      - app-network

networks:
  app-network:
    external: true
