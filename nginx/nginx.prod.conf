server {
    listen 80;
    listen [::]:80;
    server_name datacube.uxlivinglab.online www.datacube.uxlivinglab.online;


    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name datacube.uxlivinglab.online www.datacube.uxlivinglab.online;

    ssl_certificate /etc/letsencrypt/live/datacube.uxlivinglab.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datacube.uxlivinglab.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_ecdh_curve secp384r1;

    # 1. Frontend (Multi-stage Nginx uses port 80)
    location / {
        # 'react-app' matches the service name in docker-compose
        proxy_pass http://react-app:80; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Important for SPAs: Handle 404s by serving index.html
        # proxy_intercept_errors on;
        # error_page 404 = /index.html;
        proxy_intercept_errors on;
        error_page 404 =200 /index.html;
    }

    # 2. API Service
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeouts for long-running API requests
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
    }

    # 3. Core Application Service
    location /core/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Analytics Service
    location /analytics/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 5. Django Static Files
    # Ensure this path matches the volume mapped in your docker-compose for the backend
    location /static/ {
        alias /usr/src/app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
