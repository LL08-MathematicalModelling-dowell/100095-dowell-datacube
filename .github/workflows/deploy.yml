name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.image.outputs.backend }}
      frontend_image: ${{ steps.image.outputs.frontend }}
      ghcr_user: ${{ steps.image.outputs.ghcr_user }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve GHCR image names (lowercase)
        id: image
        shell: bash
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=ghcr.io/${owner}/datacube-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${owner}/datacube-frontend" >> "$GITHUB_OUTPUT"
          echo "ghcr_user=${owner}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.image.outputs.backend }}:latest
            ${{ steps.image.outputs.backend }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./UI/datacube-UI
          file: ./UI/datacube-UI/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.frontend }}:latest
            ${{ steps.image.outputs.frontend }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE=${{ vars.VITE_API_BASE }}
            VITE_GITHUB_OAUTH_CLIENT_ID=${{ secrets.VITE_GITHUB_OAUTH_CLIENT_ID }}
            VITE_GOOGLE_OAUTH_CLIENT_ID=${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}
            VITE_OAUTH_REDIRECT_URI=${{ secrets.VITE_OAUTH_REDIRECT_URI }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: deploy/docker-compose.yml
          target: ${{ secrets.WORKING_DIR }}
          strip_components: 1
          overwrite: true

      - name: Pull images and restart stack
        uses: appleboy/ssh-action@v1.2.2
        env:
          IMAGE_TAG: ${{ github.sha }}
          GHCR_USER: ${{ needs.build-and-push.outputs.ghcr_user }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          command_timeout: 30m
          envs: IMAGE_TAG,GHCR_USER
          script: |
            set -euo pipefail
            cd "${{ secrets.WORKING_DIR }}"
            if [ ! -f .env ]; then
              echo "Missing .env in WORKING_DIR. Copy deploy/.env.example and set BACKEND_IMAGE / FRONTEND_IMAGE."
              exit 1
            fi
            if [ ! -f config/backend.env ]; then
              echo "Missing config/backend.env. Copy deploy/config/backend.env.example and fill secrets."
              exit 1
            fi
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            export IMAGE_TAG="${IMAGE_TAG}"
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
