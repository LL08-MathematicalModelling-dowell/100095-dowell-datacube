# Local stack — backend/celery built with uv (see backend/Dockerfile.dev).
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=project.settings.development
    volumes:
      - ./backend:/app
      - /app/.venv
    expose:
      - "8000"
    command: >
      uv run python manage.py runserver 0.0.0.0:8000
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/health_check/').read()",
        ]
      interval: 45s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - autoheal=true
    depends_on:
      - redis
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - app-network

  autoheal:
    image: willfarrell/autoheal:latest
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=10
      - CURL_TIMEOUT=30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/log/autoheal:/var/log/autoheal
    networks:
      - app-network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=project.settings.development
    volumes:
      - ./backend:/app
      - /app/.venv
    command: >
      uv run celery -A project worker -Q analytics,maintenance -l info
    healthcheck:
      test: ["CMD-SHELL", "uv run celery -A project inspect ping"]
      interval: 1m
      timeout: 15s
      retries: 3
      start_period: 30s
    labels:
      - autoheal=true
    depends_on:
      - redis
      - backend
    networks:
      - app-network

  react-app:
    build:
      context: ./UI/datacube-UI
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
